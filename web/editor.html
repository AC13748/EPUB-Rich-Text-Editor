<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>PySave Editor</title>
<link rel="stylesheet" href="editor.css" />
</head>
<body data-theme="light">
<!-- 顶部块级工具栏（对齐、字号、字体、行距、格式刷） -->
<div id="block-toolbar" class="block-toolbar" role="toolbar">
    <div class="group">
        <button data-align="left"    title="左对齐 Ctrl+L">⫷</button>
        <button data-align="center"  title="居中 Ctrl+E">≡</button>
        <button data-align="right"   title="右对齐 Ctrl+R">⫸</button>
        <button data-align="justify" title="两端对齐 Ctrl+J">☰</button>
    </div>
    <span class="sep"></span>
    <div class="group">
        <label>字号</label>
        <select id="font-size-select">
            <option value="">默认</option>
            <option value="9">9</option><option value="10">10</option>
            <option value="10.5">10.5</option><option value="11">11</option>
            <option value="12">12</option><option value="14">14</option>
            <option value="16">16</option><option value="18">18</option>
            <option value="20">20</option><option value="22">22</option>
            <option value="24">24</option><option value="26">26</option>
            <option value="28">28</option><option value="32">32</option>
            <option value="36">36</option><option value="48">48</option>
        </select>
        <input id="font-size-input" type="number" min="6" max="96" step="0.5" placeholder="自定义" />
    </div>
    <span class="sep"></span>
    <div class="group">
        <label>字体</label>
        <select id="font-family-select"></select>
    </div>
    <span class="sep"></span>
    <div class="group">
        <label>行距</label>
        <select id="line-height-select">
            <option value="">默认</option>
            <option value="1">1.0</option>
            <option value="1.15">1.15</option>
            <option value="1.5">1.5</option>
            <option value="1.75">1.75</option>
            <option value="2">2.0</option>
            <option value="2.5">2.5</option>
            <option value="3">3.0</option>
        </select>
    </div>
    <span class="sep"></span>
    <div class="group">
        <button id="format-painter" title="格式刷（双击锁定）">🖌</button>
    </div>
</div>

<!-- 选区信息浮窗 -->
<div id="info-popover" class="info-popover" role="status"></div>

<div id="page" class="page">
    <article id="editor" class="editor" contenteditable="true" spellcheck="false" autocorrect="off">
        <p><br></p>
    </article>
</div>

<!-- 浮动工具栏（选中文字时出现） -->
<div id="floating-toolbar" class="floating-toolbar" role="toolbar">
    <button data-cmd="bold" title="加粗 Ctrl+B"><b>B</b></button>
    <button data-cmd="italic" title="斜体 Ctrl+I"><i>I</i></button>
    <button data-cmd="underline" title="下划线 Ctrl+U"><u>U</u></button>
    <button data-cmd="strike" title="删除线"><s>S</s></button>
    <button data-cmd="code" title="行内代码">&lt;/&gt;</button>
    <button data-cmd="link" title="链接">🔗</button>
    <button data-cmd="hl" title="高亮">🖍</button>
    <button data-cmd="clear" title="清除格式">✕</button>
</div>

<!-- 块级手柄（hover 时出现在每个块左侧） -->
<div id="block-handle" class="block-handle">⋮⋮</div>

<!-- 斜杠菜单 -->
<div id="slash-menu" class="slash-menu" role="listbox"></div>

<!-- 图片块工具栏（选中图片时出现） -->
<div id="image-bar" class="image-bar" role="toolbar">
    <button data-align="left"   title="左对齐 Ctrl+L">⫷</button>
    <button data-align="center" title="居中 Ctrl+E">≡</button>
    <button data-align="right"  title="右对齐 Ctrl+R">⫸</button>
    <span class="sep"></span>
    <button data-action="delete" title="删除图片">🗑</button>
</div>

<!-- 链接编辑气泡 -->
<div id="link-popover" class="link-popover">
    <input id="link-input" type="text" placeholder="https://" />
    <button id="link-apply">应用</button>
    <button id="link-remove">移除</button>
</div>

<script src="qrc:///qtwebchannel/qwebchannel.js"></script>
<script src="editor.js"></script>
</body>
</html>
